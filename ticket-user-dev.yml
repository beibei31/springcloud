server:
  port: 9001
spring:
  application:
    name: tickets-user
  datasource:
    url: jdbc:mysql://192.168.174.133:3307/spr?characterEncoding=UTF8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  jpa:
    show-sql: true
    generate-ddl: true
    database: mysql

eureka:
  client:
    register-with-eureka: true # 作为客户端需要注册到Eureka
    fetch-registry: true  # 作为客户端需要从Eureka获取注册信息
    service-url: # 客户端注册地址
      defaultZone: http://localhost:8888/eureka
  instance:
  # 优先使用该服务的IP地址注册到Eureka，在生产环境建议改为true
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
